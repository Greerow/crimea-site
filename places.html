<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Еда и Рестораны</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            /* Качественный фоновый снимок Ласточкиного гнезда с легким затемнением для читаемости */
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(30, 27, 75, 0.7)), 
                        url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 10px;
        }

        /* Кнопка возврата назад */
        .back-btn {
            display: inline-block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Выбор городов — круглые кнопки */
        .city-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .city-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 12px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .city-btn.active {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Списки ресторанов */
        .places-container {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .places-container.active {
            display: flex;
        }

        /* Карточки в стиле супераппа */
        .place-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .place-card h3 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .place-card p {
            font-size: 14px;
            color: #cbd5e1;
            margin: 0;
            line-height: 1.4;
        }

        /* Контейнер для адаптивного виджета карт */
        .maps-widget {
            width: 100%;
            height: 380px;
            overflow: hidden;
            position: relative;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Ссылка на сайт заведения */
        .site-link {
            display: block;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
        }

        .site-link:active {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Кнопка возврата -->
    <a href="index.html" class="back-btn">← Назад</a>
    
    <!-- Шаг 1: Выбор городов -->
    <div class="city-selector">
        <button class="city-btn active" onclick="showCity('sevastopol')">Севастополь</button>
        <button class="city-btn" onclick="showCity('simferopol')">Симферополь</button>
        <button class="city-btn" onclick="showCity('yalta')">Ялта</button>
    </div>

    <!-- Шаг 2: Списки ресторанов -->
    <!-- СЕВАСТОПОЛЬ -->
    <div id="sevastopol" class="places-container active">
        <div class="place-card">
            <div>
                <h3>Кафе «Этажи»</h3>
                <p>Многоуровневое уютное кафе в самом сердце исторического центра.</p>
            </div>
            
            <!-- Встроенный официальный темный виджет отзывов Яндекс Карт для "Этажей" -->
            <div class="maps-widget">
                <iframe style="width:100%; height:100%; border:none; box-sizing:border-box;" 
                        src="https://yandex.ru">
                </iframe>
            </div>

            <a href="https://etazhicafe.ru/" target="_blank" class="site-link">Перейти на сайт</a>
        </div>
    </div>

    <!-- СИМФЕРОПОЛЬ -->
    <div id="simferopol" class="places-container">
        <div class="place-card">
            <div>
                <h3>Simfero</h3>
                <p>Изысканная кухня, панорамный вид на город и высокий уровень сервиса.</p>
            </div>
            <a href="https://simfero-rest.ru" target="_blank" class="site-link">Перейти на сайт</a>
        </div>
    </div>

    <!-- ЯЛТА -->
    <div id="yalta" class="places-container">
        <div class="place-card">
            <div>
                <h3>Doctor Costeo</h3>
                <p>Средиземноморская кухня, морепродукты и отличная терраса у моря.</p>
            </div>
            <a href="https://costeo-yalta.ru" target="_blank" class="site-link">Перейти на сайт</a>
        </div>
    </div>
</div>

<script>
    function showCity(cityId) {
        document.querySelectorAll('.places-container').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.city-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(cityId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
