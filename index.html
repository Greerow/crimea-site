    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('orig.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .tg-button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: 0.3s;
            font-weight: 500;
        }
        .tg-button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* Главный контейнер-стекло */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px; /* По умолчанию под мобилки */
            box-sizing: border-box;
            text-align: center;
            animation: fadeInRight 1.2s ease-out;
        }

        h1 { 
            font-size: clamp(2.2rem, 5vw, 3.5rem); 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 2px;
        }

        h1 span { color: #ffcc00; }

        p { 
            font-size: 1.1rem; 
            margin-top: 15px; 
            opacity: 0.9; 
            line-height: 1.4;
            font-weight: 300;
        }

        /* Сетка сервисов */
        .superapp-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 25px;
        }

        .app-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 5px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }
        .app-item:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .app-item span { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .app-item p { font-size: 0.7rem; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Блок Афиши */
        .afisha-card {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(45deg, rgba(255, 204, 0, 0.15), rgba(255, 255, 255, 0.03));
            border-radius: 20px;
            border: 1px dashed rgba(255, 204, 0, 0.4);
            text-align: center;
        }
        .afisha-card h3 { margin: 0 0 5px 0; color: #ffcc00; font-size: 1.1rem; letter-spacing: 0.5px; }
        .afisha-card p { font-size: 0.8rem; margin: 0 0 10px 0; opacity: 0.8; }
        .afisha-link { color: white; text-decoration: underline; font-weight: bold; font-size: 0.85rem; }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 🔥 МАГИЯ ДЕСКТOПА: Настройки для больших экранов (мониторов и планшетов) */
        @media (min-width: 900px) {
            body {
                justify-content: center;
                padding: 40px;
            }
            
            /* Превращаем карточку в широкий полноценный дашборд */
            .glass-card {
                max-width: 1100px;
                padding: 50px;
                display: grid;
                /* Делим экран: 40% левая колонка с инфо, 60% правая с кнопками */
                grid-template-columns: 4fr 6fr;
                gap: 40px;
                text-align: left;
                align-items: center;
            }

            /* Левая колонка (Инфо и кнопка) */
            .brand-section {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }

            /* Правая колонка (Все блоки и кнопки вместе) */
            .apps-section {
                display: flex;
                flex-direction: column;
                gap: 25px;
            }

            /* На мониторе сетка кнопок становится больше (по 5 в ряд) и просторнее */
            .superapp-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 15px;
                margin-top: 0;
            }

            .app-item {
                padding: 25px 10px;
                border-radius: 20px;
            }
            .app-item span { font-size: 2.3rem; }
            .app-item p { font-size: 0.8rem; }

            .afisha-card {
                margin-top: 0;
                padding: 25px;
                text-align: left;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .afisha-card div { max-width: 70%; }
            .afisha-card p { margin-bottom: 0; }
        }
    </style>
