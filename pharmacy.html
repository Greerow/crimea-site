<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аптеки Крыма</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(30, 27, 75, 0.7)), 
                        url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 10px;
        }

        .back-btn {
            display: inline-block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .pharmacy-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pharmacy-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрируем логотипы и текст */
            gap: 15px;
            text-align: center;
        }

       /* Обновленная плашка: маскирует и обрезает белые углы картинки */
        .logo-badge {
            width: 100%;
            height: 120px; /* Немного увеличили высоту под пропорции твоей картинки */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden; /* ✂️ ВОТ ЭТО СВОЙСТВО ОБРЕЖЕТ БЕЛЫЙ ФОН КАРТИНКИ */
        }

        /* Стиль конкретно для этой полной картинки */
        .brand-logo-full {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Картинка полностью займет весь блок, скрыв свои углы за скруглением */
        }

        .pharmacy-card h3 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .pharmacy-card p {
            font-size: 14px;
            color: #cbd5e1;
            margin: 0;
            line-height: 1.5;
        }

        .order-link {
            display: block;
            width: 100%; /* Кнопка на всю ширину карточки */
            box-sizing: border-box;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
        }

        .order-link:active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .polza-btn {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }
        
        .zdrav-btn {
            background: rgba(234, 88, 12, 0.15);
            border-color: rgba(234, 88, 12, 0.3);
            color: #fb923c;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Назад</a>
    
    <div class="pharmacy-list">
        
        <!-- Карточка ПОЛЬЗА.РУ -->
        <div class="pharmacy-card">
            <!-- Официальный логотип Польза.ру на прозрачном фоне -->
            <img src="polza-logo.jpg" alt="Польза.ру" class="brand-logo">
            <p>Заказ лекарств, витаминов и БАДов с быстрой доставкой в ближайшую к вам аптеку Крыма.</p>
            <!-- Вставь свою реферальную ссылку от Польза ру в href -->
            <a href="https://zmgig.com/g/mimu7i9xes43db3f7229620a00f55f/?erid=2bL9aMPo2e49hMef4rqyS6k3Ue" target="_blank" class="order-link polza-btn">🛒 Заказать в Польза.ру</a>
        </div>

        <!-- Карточка ЗДРАВСИТИ -->
        <div class="pharmacy-card">
            <!-- Официальный логотип Здравсити на прозрачном фоне -->
            <img src="https://zdravcity.ru" alt="Здравсити" class="brand-logo">
            <p>Онлайн-сервис заказа медикаментов. Проверяйте наличие и забирайте в удобном пункте выдачи.</p>
            <a href="https://dhwnh.com/g/vhr1ruamas43db3f7229af67a6436f/?erid=25H8d7vbP8SRTvH4QRy47F" target="_blank" class="order-link zdrav-btn">🛒 Заказать в Здравсити</a>
        </div>

    </div>
</div>

</body>
</html>
